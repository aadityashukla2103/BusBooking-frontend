<div class="container d-flex justify-content-center align-items-center vh-100">

  <div class="card shadow-lg p-4 rounded-4" style="width: 400px;">

    <!-- Title -->
    <h3 class="text-center fw-bold text-danger mb-3">Create Account</h3>

    <!-- Form -->
    <form>

      <!-- Name -->
      <div class="mb-3">
        <label class="form-label">Full Name</label>
        <input type="text" class="form-control" placeholder="Enter your name">
      </div>

      <!-- Phone -->
      <div class="mb-3">
        <label class="form-label">Phone Number</label>
        <input type="tel" class="form-control" placeholder="Enter phone number">
      </div>

      <!-- Password -->
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" placeholder="Enter password">
      </div>

      <!-- Button -->
      <div class="d-grid mt-3">
        <button class="btn btn-danger fw-semibold">Sign Up</button>
      </div>

    </form>

    <!-- Login Redirect -->
    <p class="text-center mt-3 mb-0 small">
      Already have an account? 
      <a routerLink="/login" class="text-danger fw-semibold">Login</a>
    </p>

  </div>

</div>
