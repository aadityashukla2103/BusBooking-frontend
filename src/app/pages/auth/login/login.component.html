<div class="container d-flex justify-content-center align-items-center vh-100">

  <div class="card shadow-lg p-4 rounded-4" style="width: 400px;">

    <!-- Title -->
    <h3 class="text-center fw-bold text-danger mb-3">Login</h3>

    <!-- Form -->
    <form>

      <!-- Phone -->
      <div class="mb-3">
        <label class="form-label">Phone Number</label>
        <input type="tel" class="form-control" placeholder="Enter phone number">
      </div>

      <!-- Password -->
      <div class="mb-2">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" placeholder="Enter password">
      </div>

      <!-- Forgot -->
      <div class="text-end mb-3">
        <a href="#" class="small text-danger text-decoration-none">
          Forgot Password?
        </a>
      </div>

      <!-- Button -->
      <div class="d-grid">
        <button class="btn btn-danger fw-semibold">Login</button>
      </div>

    </form>

    <!-- Signup Redirect -->
    <p class="text-center mt-3 mb-0 small">
      Don’t have an account?
      <a routerLink="/signup" class="text-danger fw-semibold">Sign Up</a>
    </p>

  </div>

</div>
