<div class="container d-flex justify-content-center align-items-center vh-100">

  <div class="card shadow-lg p-4 rounded-4" style="width: 400px;">

    <!-- Title -->
    <h3 class="text-center fw-bold text-danger mb-3">Login</h3>

    <!-- Form -->
    <form #loginForm="ngForm" (ngSubmit)="onLogin()">

      <!-- Username -->
      <div class="mb-3">
        <label class="form-label">Username</label>

        <input
          type="text"
          name="username"
          [(ngModel)]="loginData.username"
          class="form-control"
          placeholder="Enter username"
          required
          #username="ngModel">

        <!-- Error -->
        <small class="text-danger"
          *ngIf="username.invalid && username.touched">
          Username is required
        </small>
      </div>

      <!-- Password -->
      <div class="mb-2">
        <label class="form-label">Password</label>

        <input
          type="password"
          name="password"
          [(ngModel)]="loginData.password"
          class="form-control"
          placeholder="Enter password"
          required
          #password="ngModel">

        <!-- Error -->
        <small class="text-danger"
          *ngIf="password.invalid && password.touched">
          Password is required
        </small>
      </div>

      <!-- Forgot -->
      <div class="text-end mb-3">
        <a href="#" class="small text-danger text-decoration-none">
          Forgot Password?
        </a>
      </div>

      <!-- Button -->
      <div class="d-grid">
        <button class="btn btn-danger fw-semibold"
          [disabled]="!loginForm.valid">
          Login
        </button>
      </div>

    </form>

    <!-- Signup Redirect -->
    <p class="text-center mt-3 mb-0 small">
      Don’t have an account?
      <a routerLink="/signup" class="text-danger fw-semibold">Sign Up</a>
    </p>

  </div>

</div>
