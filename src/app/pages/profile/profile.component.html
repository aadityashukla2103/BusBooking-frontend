<div class="container mt-5 d-flex justify-content-center">

  <div class="card shadow p-4" style="width: 350px;" *ngIf="user">

    <h3 class="text-center text-danger mb-3">My Profile</h3>

    <div class="mb-2">
      <strong>Username:</strong>
      <p class="mb-1">{{ user?.username }}</p>
    </div>

    <div class="mb-2">
      <strong>Name:</strong>
      <p class="mb-1">{{ user?.name }}</p>
    </div>

    <div class="mb-2">
      <strong>Phone:</strong>
      <p class="mb-1">{{ user?.phone }}</p>
    </div>

   
  </div>

</div>
