<div class="container mt-4">
  <h2 class="text-center text-danger mb-4">My Bookings</h2>

  <div *ngIf="bookings.length === 0" class="text-center">
    No bookings found
  </div>

  <div class="row">
    <div class="col-md-6 mb-3" *ngFor="let b of bookings">

      <div class="card shadow-sm p-3">

        <h5 class="text-danger">{{ b.busName }}</h5>

        <p><strong>Route:</strong> {{ b.from }} → {{ b.to }}</p>
        <p><strong>Date:</strong> {{ b.journeyDate }}</p>
        <p><strong>Seats:</strong> {{ b.seats }}</p>

        <p>
          <strong>Status:</strong>
          <span 
            class="badge"
            [ngClass]="{
              'bg-success': b.status === 'CONFIRMED',
              'bg-warning': b.status === 'PENDING',
              'bg-danger': b.status === 'CANCELLED'
            }"
          >
            {{ b.status }}
          </span>
        </p>

      </div>

    </div>
  </div>
</div>
